services:
  caddy:
    image: ${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf_api_node/caddy:${HAF_API_NODE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - admin
      - servers
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
      CADDY_SITES: ${CADDY_SITES:-${PUBLIC_HOSTNAME}}
      JSONRPC_API_SERVER_NAME: ${JSONRPC_API_SERVER_NAME:-drone}
      ADMIN_ENDPOINT_PROTOCOL: ${ADMIN_ENDPOINT_PROTOCOL:-https}
      # TLS configuration (new vars with backwards compatibility for old vars)
      CADDY_TLS_SELF_SIGNED: ${CADDY_TLS_SELF_SIGNED:-}
      TLS_SELF_SIGNED_SNIPPET: ${TLS_SELF_SIGNED_SNIPPET:-}
      # Admin access restriction (new vars with backwards compatibility for old vars)
      CADDY_ADMIN_LOCAL_ONLY: ${CADDY_ADMIN_LOCAL_ONLY:-}
      LOCAL_ADMIN_ONLY_SNIPPET: ${LOCAL_ADMIN_ONLY_SNIPPET:-}
      CADDY_ADMIN_ALLOWED_IPS: ${CADDY_ADMIN_ALLOWED_IPS:-}
      # Trusted proxies for X-Forwarded-For
      CADDY_TRUSTED_PROXIES: ${CADDY_TRUSTED_PROXIES:-private_ranges}
      # Rate limiting
      CADDY_RATE_LIMIT_ENABLED: ${CADDY_RATE_LIMIT_ENABLED:-true}
      CADDY_RATE_LIMIT_EVENTS: ${CADDY_RATE_LIMIT_EVENTS:-600}
      CADDY_RATE_LIMIT_WINDOW: ${CADDY_RATE_LIMIT_WINDOW:-1m}
    volumes:
      - type: bind
        source: ./caddy/entrypoint.sh
        target: /usr/local/bin/entrypoint.sh
        read_only: true
      - type: bind
        source: ./caddy/Caddyfile.tmpl
        target: /etc/caddy/Caddyfile.tmpl
        read_only: true
      - type: bind
        source: ./caddy/snippets
        target: /etc/caddy/snippets
        read_only: true
      - type: bind
        source: ./caddy/admin_html
        target: /etc/caddy/admin_html
        read_only: true
      - type: bind
        source: ${HAF_DATA_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}}/logs/pgbadger
        target: /etc/caddy/pgbadger
        read_only: true
      - type: bind
        source: ${HAF_DATA_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}}/logs/caddy
        target: /var/log/caddy
        read_only: false
      - type: volume
        source: caddy_data
        target: /data
      - type: volume
        source: caddy_config
        target: /config
    healthcheck:
      test: ["CMD-SHELL", "wget -T2 -nv -t1 --spider http://127.0.0.1:2019/reverse_proxy/upstreams || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    networks:
      - haf-network
  version-display:
    image: ${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf_api_node/version-display:${HAF_API_NODE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - admin
      - servers
    environment:
      PROJECT: ${COMPOSE_PROJECT_NAME}
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    networks:
      - haf-network

volumes:
  # this volume stores your SSL certificates, every time you destroy this volume,
  # caddy will obtain a new certificate at startup, and this can quickly cause
  # you to hit letsencrypt rate limts.
  caddy_data:
  caddy_config:
