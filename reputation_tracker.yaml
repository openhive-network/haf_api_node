services:
  reputation-tracker-install:
    image: ${REPUTATION_TRACKER_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/reputation_tracker}:${REPUTATION_TRACKER_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - apps
      - hafbe
      - hivemind
      - reputation-tracker
    environment:
      POSTGRES_HOST: haf
    networks:
      haf-network:
    command:
      - install_app
      - --swagger-url=${PUBLIC_HOSTNAME}
      - --is_forking=${REPUTATION_TRACKER_IS_FORKING:-${IS_FORKING:-TRUE}}
    depends_on:
      haf:
        condition: service_healthy
  reputation-tracker-uninstall:
    image: ${REPUTATION_TRACKER_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/reputation_tracker}:${REPUTATION_TRACKER_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - reputation-tracker-uninstall
    environment:
      POSTGRES_HOST: haf
    networks:
      haf-network:
    command:
      - uninstall_app
    depends_on:
      haf:
        condition: service_healthy
  reputation-tracker-block-processing:
    image: ${REPUTATION_TRACKER_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/reputation_tracker}:${REPUTATION_TRACKER_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - apps
      - hafbe
      - hivemind
      - reputation-tracker
    environment:
      POSTGRES_HOST: haf
      POSTGRES_USER: reptracker_owner
    networks:
      haf-network:
    restart: on-failure
    command:
      - process_blocks
    healthcheck:
      test: ["CMD-SHELL","/app/block-processing-healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 48h
    depends_on:
      haf:
        condition: service_healthy
      reputation-tracker-install:
        condition: service_completed_successfully
  reputation-tracker-postgrest:
    image: ${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf_api_node/postgrest:${HAF_API_NODE_VERSION:-${HIVE_API_NODE_VERSION}}
    # See note in hivemind.yaml — host containerd may default to nofile=1024
    # soft, which postgrest can exhaust silently under load.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    profiles:
      - apps
      - hivemind
      - reputation-tracker
      - hafbe
    environment:
      PGRST_SERVER_HOST: "::"
      PGRST_ADMIN_SERVER_PORT: 3001
      PGRST_DB_URI: postgresql://reptracker_user@pgbouncer:6432/haf_block_log?application_name=reputation_tracker_postgrest
      PGRST_DB_SCHEMA: reptracker_endpoints
      PGRST_DB_ANON_ROLE: reptracker_user
      PGRST_DB_POOL: 6
      PGRST_DB_ROOT_SPEC: root
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: 10
      PGRST_DB_EXTRA_SEARCH_PATH: reptracker_app
      # PGRST_OPENAPI_SERVER_PROXY_URI: http://${PUBLIC_HOSTNAME}/reptracker_user/
      PGRST_LOG_LEVEL: ${REPUTATION_TRACKER_SERVER_LOG_LEVEL:-error}
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=2 -nv -t1 --spider 127.0.0.1:3001/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    networks:
      haf-network:
    depends_on:
      pgbouncer:
        condition: service_healthy
      reputation-tracker-install:
        condition: service_completed_successfully
  reputation-tracker-postgrest-rewriter:
    image: ${REPUTATION_TRACKER_REWRITER_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/reputation_tracker/postgrest-rewriter}:${REPUTATION_TRACKER_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - apps
      - reputation-tracker
      - hafbe
      - hivemind
    labels:
      # for Swagger UI
      - "io.hive.swagger.url=/reputation-api/"
      - "io.hive.swagger.name=Reputation Tracker"
      - "io.hive.swagger.order=5"
      - "io.hive.healthcheck.port=7009"
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=2 -nv -t1 --spider 127.0.0.1:81/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    depends_on:
      reputation-tracker-postgrest:
        condition: service_healthy
    networks:
      - haf-network
