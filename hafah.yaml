services:
  hafah-install:
    image: ${HAFAH_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hafah}:${HAFAH_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - apps
      - hafah
      - hafbe
      - haf-block-explorer-drop-db
      - hivemind
    environment:
      POSTGRES_URL: postgresql://haf_admin@haf/haf_block_log
    command:
      - install_app
      - --swagger-url=${PUBLIC_HOSTNAME}
    networks:
      haf-network:
    depends_on:
      haf:
        condition: service_healthy
  hafah-uninstall:
    image: ${HAFAH_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hafah}:${HAFAH_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - hafah-uninstall
    environment:
      POSTGRES_URL: postgresql://haf_admin@haf/haf_block_log
    command:
      - uninstall_app
    networks:
      haf-network:
    depends_on:
      haf:
        condition: service_healthy
  hafah-postgrest:
    image: ${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf_api_node/postgrest:${HAF_API_NODE_VERSION:-${HIVE_API_NODE_VERSION}}
    # See note in hivemind.yaml — host containerd may default to nofile=1024
    # soft, which postgrest can exhaust silently under load.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    profiles:
      - apps
      - hafah
      - hafbe
    environment:
      PGRST_SERVER_HOST: "::"
      PGRST_ADMIN_SERVER_PORT: 3001
      PGRST_DB_URI: postgresql://hafah_user@pgbouncer:6432/haf_block_log?application_name=hafah_postgrest
      PGRST_DB_SCHEMA: hafah_endpoints, hafah_api_v1, hafah_api_v2
      PGRST_DB_ROOT_SPEC: home
      PGRST_DB_ANON_ROLE: hafah_user
      PGRST_DB_POOL: 8
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: 10
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:3000
      PGRST_LOG_LEVEL: ${HAFAH_SERVER_LOG_LEVEL:-error}
    networks:
      haf-network:
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=2 -nv -t1 --spider 127.0.0.1:3001/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    depends_on:
      hafah-install:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
  hafah-postgrest-rewriter:
    image: ${HAFAH_REWRITER_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hafah/postgrest-rewriter}:${HAFAH_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - apps
      - hafah
      - hafbe
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=2 -nv -t1 --spider 127.0.0.1:81/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    labels:
      # for Swagger UI
      - "io.hive.swagger.url=/hafah-api/"
      - "io.hive.swagger.name=HAF Account History"
      - "io.hive.swagger.order=2"
      - "io.hive.healthcheck.port=7003"
    depends_on:
      hafah-postgrest:
        condition: service_healthy
    networks:
      - haf-network
