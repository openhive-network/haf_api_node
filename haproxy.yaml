services:
  haproxy:
    image: ${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf_api_node/haproxy:${HAF_API_NODE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - servers
    environment:
      SYNC_BROADCAST_BACKEND_SERVER: "${SYNC_BROADCAST_BACKEND_SERVER:-api.hive.blog}"
      SYNC_BROADCAST_BACKEND_PORT: "${SYNC_BROADCAST_BACKEND_PORT:-443}"
      SYNC_BROADCAST_BACKEND_SSL: "${SYNC_BROADCAST_BACKEND_SSL:-ssl}"
      # Email alert configuration (optional)
      HAPROXY_EMAIL_TO: "${HAPROXY_EMAIL_TO:-}"
      HAPROXY_EMAIL_FROM: "${HAPROXY_EMAIL_FROM:-}"
      HAPROXY_EMAIL_LEVEL: "${HAPROXY_EMAIL_LEVEL:-}"
      PUBLIC_HOSTNAME: "${PUBLIC_HOSTNAME}"
    depends_on:
      haproxy-healthchecks:
        condition: service_started
      smtp-relay:
        condition: service_started
        required: false
    volumes:
      - type: bind
        source: ./haproxy/00-global.cfg
        target: /usr/local/etc/haproxy/00-global.cfg
        read_only: true
      - type: bind
        source: ./haproxy/10-defaults.cfg
        target: /usr/local/etc/haproxy/10-defaults.cfg
        read_only: true
      - type: bind
        source: ./haproxy/30-proxies.cfg
        target: /usr/local/etc/haproxy/30-proxies.cfg
        read_only: true
    networks:
      - haf-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 --spider http://127.0.0.1:8001/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    # Command removed - let entrypoint script handle it
  haproxy-healthchecks:
    image: ${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf_api_node/haproxy-healthchecks:${HAF_API_NODE_VERSION:-${HIVE_API_NODE_VERSION}}
    environment:
      POSTGRES_URL: postgresql://haf_admin@pgbouncer:6432/haf_block_log
      POSTGRES_URL_HAFBE: postgresql://hafbe_user@pgbouncer:6432/haf_block_log
      POSTGRES_URL_BTRACKER: postgresql://btracker_user@pgbouncer:6432/haf_block_log
      POSTGRES_URL_REPTRACKER: postgresql://reptracker_user@pgbouncer:6432/haf_block_log
      POSTGRES_URL_HIVESENSE: postgresql://hivesense_user@pgbouncer:6432/haf_block_log
      POSTGRES_URL_NFTTRACKER: postgresql://nft_tracker_user@pgbouncer:6432/haf_block_log
      EXPECTED_BLOCK_TIME: "${EXPECTED_BLOCK_TIME:-}"
    healthcheck:
      test: ["CMD-SHELL", "/healthcheck_healthcheck.sh || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    profiles:
      - servers
      - haproxy-healthchecks
    networks:
      - haf-network
  smtp-relay:
    profiles:
      - email
    image: grafana/smtprelay
    environment:
      # SMTP configuration must be provided when using email profile
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_AUTH_TYPE: "${SMTP_AUTH_TYPE:-plain}"
      PUBLIC_HOSTNAME: "${PUBLIC_HOSTNAME}"
    command:
      - -hostname=${PUBLIC_HOSTNAME}
      - -listen=0.0.0.0:25
      - -allowed_nets=
      - -remote_host=${SMTP_HOST:-localhost}
      - -remote_user=${SMTP_USER:-}
      - -remote_pass=${SMTP_PASS:-}
      - -remote_auth=${SMTP_AUTH_TYPE:-plain}
    networks:
      - haf-network
