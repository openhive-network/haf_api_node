logging_collector = on
log_directory = '/home/hived/postgresql_logs/'
log_min_duration_statement = 1000
log_line_prefix = '%t [%p]: app=%a '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 200
log_autovacuum_min_duration = 0
log_error_verbosity = default
log_filename = 'postgresql.log'

# make log files readable to everyone
log_file_mode = 0644

# by default, postgresql checks for deadlock when it has taken more than 1s to acquire a lock.
# we use advisory locks for synchronization between worker threads in hivesense, so it's normal
# for locks to be held for at least 3s.  Upping this suppresses unwanted warnings in the log
deadlock_timeout = 5s
