name: 'haf_api_node_dind'
services:
  docker:
    image: registry.gitlab.syncad.com/hive/haf_api_node/dind:${DIND_TAG:-latest}
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: /certs
      TINI_SUBREAPER: "true"
      TOP_LEVEL_DATASET_MOUNTPOINT: /cache/haf-datadir
    volumes:
      - type: volume
        source: docker-certs-ca
        target: /certs/ca
      - type: volume
        source: docker-certs-client
        target: /certs/client
      - type: volume
        source: docker-certs-server
        target: /certs/server
      - type: volume
        source: docker-lib
        target: /var/lib/docker
      - type: volume
        source: haf_datadir
        target: /cache/haf-datadir
    networks:
      - docker
    ports:
      - name: docker
        target: 2375
        published: 2375
      - name: docker-tls
        target: 2376
        published: 2376
      - name: http
        target: 80
        published: 8080
      - name: https
        target: 443
        published: 8443
    healthcheck:
      test: [ "CMD", "docker", "version"]
      interval: 5s
      timeout: 5s
  compose:
    image: registry.gitlab.syncad.com/hive/haf_api_node/compose:${COMPOSE_TAG:-latest}
    environment:
      DOCKER_TLS_CERTDIR: /certs
      DOCKER_HOST: 
      ARGUMENTS: 
      TOP_LEVEL_DATASET_MOUNTPOINT: /cache/haf-datadir
      PUBLIC_HOSTNAME:
      USE_ALTERNATE_HAPROXY_CONFIG:
    volumes:
      - type: volume
        source: docker-certs-client
        target: /certs/client
    networks:
      - docker
    depends_on:
      docker:
        condition: service_healthy
volumes:
  docker-certs-ca:
  docker-certs-client:
    name: docker-certs-client
  docker-certs-server:
  docker-lib:
  haf_datadir:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${HAF_DATA_DIRECTORY}/
networks:
  docker:    
    name: docker