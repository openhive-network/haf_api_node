services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.49.1}
    profiles:
      - monitoring
      - monitoring-central
      - monitoring-leaf
    user: "${HAF_UID:-1000}:${HAF_GID:-1000}"
    environment:
      - PROMETHEUS_ROLE=${PROMETHEUS_ROLE:-default}
      - PROMETHEUS_INSTANCE=${PROMETHEUS_INSTANCE:-${COMPOSE_PROJECT_NAME}}
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - ${MONITORING_EXTRA_CONFIG_DIR:-./monitoring/prometheus-extra}:/etc/prometheus/extra:ro
      - type: bind
        source: ${HAF_MONITORING_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs/monitoring}/prometheus
        target: /prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=720h"
      - "--web.enable-lifecycle"
      - "--enable-feature=expand-external-labels"
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  nodeexporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.7.0}
    profiles:
      - monitoring-system
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-v0.47.2}
    profiles:
      - monitoring-system
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /data/docker:/data/docker:ro
      - /cgroup:/cgroup:ro
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.3.3}
    profiles:
      - monitoring
      - monitoring-central
    user: "${HAF_UID:-1000}:${HAF_GID:-1000}"
    depends_on:
      - loki
      - prometheus
    volumes:
      - type: bind
        source: ${HAF_MONITORING_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs/monitoring}/grafana
        target: /var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=${ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Absolute root_url so Grafana generates correct redirect/email links
      # behind a reverse-proxy sub-path mount.
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-${ADMIN_ENDPOINT_PROTOCOL:-https}://${PUBLIC_HOSTNAME}/admin/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Grafana's CSRF middleware compares the browser's Origin header to the
      # request's Host header. When upstream proxies rewrite Host (system
      # nginx default), POSTs to /api/ds/query get rejected with 403
      # "origin not allowed". Trust PUBLIC_HOSTNAME explicitly.
      - GF_SECURITY_CSRF_TRUSTED_ORIGINS=${GF_SECURITY_CSRF_TRUSTED_ORIGINS:-${PUBLIC_HOSTNAME}}
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  loki:
    image: grafana/loki:${LOKI_VERSION:-2.9.4}
    profiles:
      - monitoring
      - monitoring-central
    user: "${HAF_UID:-1000}:${HAF_GID:-1000}"
    volumes:
      - type: bind
        source: ${HAF_MONITORING_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs/monitoring}/loki
        target: /loki
      - ./monitoring/loki:/etc/loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-2.9.4}
    profiles:
      - monitoring
      - monitoring-shipper
    depends_on:
      # required: false so promtail can start in shipper-only stacks where
      # loki runs on a remote host and isn't part of the active profile.
      loki:
        condition: service_started
        required: false
    environment:
      - LOKI_PUSH_URL=${LOKI_PUSH_URL:-http://loki:3100/loki/api/v1/push}
    volumes:
      - ./monitoring/promtail:/etc/promtail
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  hived-pme:
    image: registry.gitlab.syncad.com/hive/hived-pme:${HIVED_PME_VERSION:-49a7312d}
    profiles:
      - monitoring
      - monitoring-targets
    restart: unless-stopped
    depends_on:
      # required: false so this scrape target can run on backend-only stacks
      # without local loki/prometheus.
      loki:
        condition: service_started
        required: false
      prometheus:
        condition: service_started
        required: false
    networks:
      - haf-network
    healthcheck:
      test: curl --fail  http://127.0.0.1:9185/healthz || exit 1
      interval: 10s
      retries: 3
      start_period: 5s
      timeout: 5s
    labels:
      org.label-schema.group: "monitoring"

  postgresexporter:
    image: quay.io/prometheuscommunity/postgres-exporter:${POSTGRESEXPORTER_VERSION:-v0.16.0}
    profiles:
      - monitoring
      - monitoring-targets
    restart: unless-stopped
    command:
      - --no-collector.stat_bgwriter
    depends_on:
      # required: false so this scrape target can run on backend-only stacks
      # without local loki/prometheus.
      loki:
        condition: service_started
        required: false
      prometheus:
        condition: service_started
        required: false
    networks:
      - haf-network
    environment:
      - DATA_SOURCE_NAME=${DATA_SOURCE:-postgresql://postgres@haf:5432/postgres?sslmode=disable}
    labels:
      org.label-schema.group: "monitoring"

  loki-relay:
    # Tiny socat forwarder used in split-stack deployments where hived-pme
    # runs alongside hived (typically on a backend host) but the Loki it
    # ships block_stats to lives on a different host. hived-pme has the
    # upstream "loki:3100" hardcoded; this service registers itself under
    # the docker-network alias `loki` so that name resolves to a forwarder
    # that bridges to LOKI_RELAY_TARGET (host:port form, e.g. the central
    # Loki's exposed cross-host port).
    #
    # Mutually exclusive with monitoring-central — if a real loki service
    # is already in the active profile set on this stack, leave this off.
    image: alpine/socat:${SOCAT_VERSION:-1.7.4.4}
    profiles:
      - monitoring-loki-relay
    # LOKI_RELAY_TARGET must be set as host:port (e.g. 172.16.100.4:23100)
    # in .env when this profile is active. socat fails loudly at startup if
    # it isn't, with a clear error in `docker compose logs loki-relay`.
    command: TCP-LISTEN:3100,fork,reuseaddr TCP:${LOKI_RELAY_TARGET:-}
    restart: unless-stopped
    networks:
      haf-network:
        aliases:
          - loki
    labels:
      org.label-schema.group: "monitoring"

  blackboxexporter:
    image: prom/blackbox-exporter:${BLACKBOX_VERSION:-v0.24.0}
    profiles:
      - monitoring-system
    restart: unless-stopped
    depends_on:
      # required: false so monitoring-system can run host-level on a stack
      # that doesn't itself host loki/prometheus.
      loki:
        condition: service_started
        required: false
      prometheus:
        condition: service_started
        required: false
    volumes:
      - ./monitoring/blackbox/config.yml:/etc/blackbox_exporter/config.yml
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

