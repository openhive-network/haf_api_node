services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.49.1}
    profiles:
      - monitoring
    user: "${HAF_UID:-1000}:${HAF_GID:-1000}"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - type: bind
        source: ${HAF_MONITORING_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs/monitoring}/prometheus
        target: /prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=720h"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  nodeexporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.7.0}
    profiles:
      - monitoring-system
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-v0.47.2}
    profiles:
      - monitoring-system
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /data/docker:/data/docker:ro
      - /cgroup:/cgroup:ro
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.3.3}
    profiles:
      - monitoring
    user: "${HAF_UID:-1000}:${HAF_GID:-1000}"
    depends_on:
      - loki
      - prometheus
    volumes:
      - type: bind
        source: ${HAF_MONITORING_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs/monitoring}/grafana
        target: /var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=${ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=/admin/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  loki:
    image: grafana/loki:${LOKI_VERSION:-2.9.4}
    profiles:
      - monitoring
    user: "${HAF_UID:-1000}:${HAF_GID:-1000}"
    volumes:
      - type: bind
        source: ${HAF_MONITORING_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs/monitoring}/loki
        target: /loki
      - ./monitoring/loki:/etc/loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-2.9.4}
    profiles:
      - monitoring
    depends_on:
      - loki
    volumes:
      - ./monitoring/promtail:/etc/promtail
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

  hived-pme:
    image: registry.gitlab.syncad.com/hive/hived-pme:${HIVED_PME_VERSION:-49a7312d}
    profiles:
      - monitoring
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
    networks:
      - haf-network
    healthcheck:
      test: curl --fail  http://127.0.0.1:9185/healthz || exit 1
      interval: 10s
      retries: 3
      start_period: 5s
      timeout: 5s
    labels:
      org.label-schema.group: "monitoring"

  postgresexporter:
    image: quay.io/prometheuscommunity/postgres-exporter:${POSTGRESEXPORTER_VERSION:-v0.16.0}
    profiles:
      - monitoring
    restart: unless-stopped
    command:
      - --no-collector.stat_bgwriter
    depends_on:
      - loki
      - prometheus
    networks:
      - haf-network
    environment:
      - DATA_SOURCE_NAME=${DATA_SOURCE:-postgresql://postgres@haf:5432/postgres?sslmode=disable}
    labels:
      org.label-schema.group: "monitoring"

  blackboxexporter:
    image: prom/blackbox-exporter:${BLACKBOX_VERSION:-v0.24.0}
    profiles:
      - monitoring-system
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
    volumes:
      - ./monitoring/blackbox/config.yml:/etc/blackbox_exporter/config.yml
    networks:
      - haf-network
    labels:
      org.label-schema.group: "monitoring"

