services:
  swagger:
    image: ${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf_api_node/swagger:${HAF_API_NODE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - hafbe
      - hivemind
      - hivesense
      - apps
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      haf-network:
    healthcheck:
      test: ["CMD-SHELL","curl -sf localhost > /dev/null || exit 1"]
