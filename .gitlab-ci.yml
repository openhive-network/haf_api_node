stages:
  - build
  - replay
  - test
  - publish
  - cleanup

variables:
  # Variables required by Common CI jobs
  CI_COMMON_JOB_VERSION: "1ce04340ebfe838fd7fa09aebdde3bd7e1218bce"
  DOCKER_BUILDER_TAG: "$CI_COMMON_JOB_VERSION"
  DOCKER_DIND_TAG: "$CI_COMMON_JOB_VERSION"
  IMAGE_REMOVER_TAG: "$CI_COMMON_JOB_VERSION"

  # Git configuration
  # Fetch strategy reuses workspace between jobs, reducing GitLab server load.
  # Full clone (depth 0) enables efficient incremental fetches - shallow clones
  # don't reduce server CPU and make fetch less effective.
  GIT_STRATEGY: fetch
  GIT_DEPTH: 0
  GIT_SUBMODULE_DEPTH: 0
  GIT_SUBMODULE_STRATEGY: recursive
  # Temporary: separate clone path prevents clone-strategy jobs from erasing
  # fetch workspaces during transition. Remove once all projects use fetch.
  GIT_CLONE_PATH: $CI_BUILDS_DIR/fetch/$CI_RUNNER_SHORT_TOKEN/$CI_CONCURRENT_ID/$CI_PROJECT_PATH

  # Replay confioguration
  BLOCK_LOG_SOURCE_DIR: "/blockchain/block_log_5m"
  REPLAY_DIRECTORY_PREFIX: "/cache/replay_data_api_node"
  REPLAY_DIRECTORY: "${REPLAY_DIRECTORY_PREFIX}_${CI_COMMIT_SHORT_SHA}_1.27.8"
  REPLAY_PIPELINE_DIRECTORY: "${REPLAY_DIRECTORY_PREFIX}_${CI_PIPELINE_ID}"
  DOCKER_TLS_CERTDIR: "${REPLAY_PIPELINE_DIRECTORY}_certs"

  # Other settings
  TEST_IMAGE_TAG: ":ubuntu22.04-12"

include:
  - template: Workflows/Branch-Pipelines.gitlab-ci.yml
  - project: hive/common-ci-configuration
    ref: 1ce04340ebfe838fd7fa09aebdde3bd7e1218bce
    file:
      - /templates/docker_image_jobs.gitlab-ci.yml
      - /templates/cache_cleanup.gitlab-ci.yml
  - local: ci/node-replay.gitlab-ci.yml

default:
  hooks:
    pre_get_sources_script:
      # Clean corrupt git state left by cancelled pipelines (see GitLab #296638, #4600)
      # Wrapped in subshell to avoid changing working directory for subsequent git operations
      - |
        (
        cd "${CI_PROJECT_DIR:-/builds}" 2>/dev/null || exit 0
        echo "pre_get_sources: checking $(pwd) for corrupt git state"
        if [ -d ".git" ]; then
          # Remove stale lock files that block git operations
          find .git -name "*.lock" -delete 2>/dev/null || true

          # Check if main repo is corrupt - if so, remove .git to force fresh clone
          if ! git rev-parse HEAD >/dev/null 2>&1; then
            echo "pre_get_sources: main repository corrupt, forcing fresh clone"
            rm -rf .git
          else
            # Main repo OK - check and clean corrupt submodules
            # Check both the working dir and .git/modules/ since either can be corrupt
            if [ -f ".gitmodules" ]; then
              git config --file .gitmodules --get-regexp path 2>/dev/null | awk '{print $2}' | while read submod; do
                needs_clean=false
                [ -z "$submod" ] && continue
                # Check if submodule working directory exists but is corrupt
                if [ -d "$submod" ] && [ -f "$submod/.git" ]; then
                  if ! git -C "$submod" rev-parse HEAD >/dev/null 2>&1; then
                    needs_clean=true
                  fi
                fi
                # Check if .git/modules exists but is corrupt (even if working dir is gone)
                if [ -d ".git/modules/$submod" ]; then
                  if ! git --git-dir=".git/modules/$submod" rev-parse HEAD >/dev/null 2>&1; then
                    echo "pre_get_sources: $submod corrupt (rev-parse failed)"
                    needs_clean=true
                  fi
                fi
                if [ "$needs_clean" = true ]; then
                  echo "pre_get_sources: cleaning corrupt submodule: $submod"
                  rm -rf "$submod" ".git/modules/$submod"
                fi
              done
            fi
            echo "pre_get_sources: existing repo OK"
          fi
        else
          echo "pre_get_sources: no .git directory (fresh workspace)"
        fi
        )

######## Build ########

docker-build:
  extends: 
    - .docker_image_builder_job_template
  stage: build
  variables:
    TAG: "${CI_COMMIT_SHORT_SHA}"
  before_script:
    - !reference [.docker_image_builder_job_template, before_script]
    - |
      echo -e "\e[0Ksection_start:$(date +%s):login[collapsed=true]\r\e[0KLogging to Docker registry..."
      docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
      echo -e "\e[0Ksection_end:$(date +%s):login\r\e[0K"
  script:
    - |
      echo -e "\e[0Ksection_start:$(date +%s):build[collapsed=true]\r\e[0KBaking Docker images..."
      # Export build arguments for version-display image
      export BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      export GIT_COMMIT_SHA="${CI_COMMIT_SHA}"
      export GIT_CURRENT_BRANCH="${CI_COMMIT_BRANCH}"
      export GIT_LAST_LOG_MESSAGE="${CI_COMMIT_MESSAGE}"
      export GIT_LAST_COMMITTER="${CI_COMMIT_AUTHOR}"
      export GIT_LAST_COMMIT_DATE="${CI_COMMIT_TIMESTAMP}"
      export TAG="${TAG:-${CI_COMMIT_SHORT_SHA}}"
      export CI_COMMIT_TAG="${CI_COMMIT_TAG}"
      docker buildx bake --file=docker-bake.hcl --provenance=false --progress="plain" "pipeline-images"
      echo -e "\e[0Ksection_end:$(date +%s):build\r\e[0K"
  tags:
    - public-runner-docker

######## End build ########

######## Replay ########

haf-node-replay:
  extends:
    - .haf-node-replay
  stage: replay
  needs:
    - docker-build
  tags:
    - data-cache-storage
    - fast
  # Temporarily disabled - missing Docker image tags (hivemind:1.28.6-rc1 etc)
  # Re-enable when upstream images are available
  rules:
    - when: manual
      allow_failure: true

######## End replay ########

######## Test ########

# Creates a copy of replay data to be used in the tests
haf_api_node_replay_data_copy:
  extends:
    - .haf_api_node_replay_data_copy
  stage: test
  needs:
    - haf-node-replay
  tags:
    - data-cache-storage
    - fast
  # Temporarily disabled - depends on haf-node-replay which is disabled
  rules:
    - when: manual
      allow_failure: true

# Tests if HAF API node is working properly
haf_api_node_test:
  extends:
    - .haf_api_node_test
  stage: test
  needs:
    - haf_api_node_replay_data_copy
  tags:
    - data-cache-storage
    - fast
  # Temporarily disabled - depends on haf_api_node_replay_data_copy which is disabled
  rules:
    - when: manual
      allow_failure: true

######## End test ########

######## Publish ########

# Publish all release images to blog registry on release tags
publish-images-release:
  stage: publish
  extends:
    - .docker_image_builder_job_template
  variables:
    # Use CI_COMMIT_TAG if available, otherwise use CI_COMMIT_REF_NAME (for tags pushed with commits)
    TAG: "${CI_COMMIT_TAG:-$CI_COMMIT_REF_NAME}"
    CI_COMMIT_TAG: "${CI_COMMIT_TAG:-$CI_COMMIT_REF_NAME}"
  before_script:
    - !reference [.docker_image_builder_job_template, before_script]
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker login -u "$BLOG_REGISTRY_USER" -p "$BLOG_REGISTRY_PASSWORD" registry-upload.hive.blog
  script:
    - |
      # Export build arguments for images that need them
      export BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      export GIT_COMMIT_SHA="${CI_COMMIT_SHA}"
      export GIT_CURRENT_BRANCH="${CI_COMMIT_BRANCH}"
      export GIT_LAST_LOG_MESSAGE="${CI_COMMIT_MESSAGE}"
      export GIT_LAST_COMMITTER="${CI_COMMIT_AUTHOR}"
      export GIT_LAST_COMMIT_DATE="${CI_COMMIT_TIMESTAMP}"
      export CI_COMMIT_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_REF_NAME}"
      docker buildx bake --file=docker-bake.hcl --provenance=false --progress="plain" "release-images"
  tags:
    - public-runner-docker
  rules:
    - if: $CI_PIPELINE_TRIGGERED
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline"
      when: never
    # Handle tags pushed separately (source: tag)
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^[v01].*/
      when: always
    # Handle tags pushed with commits (source: push) - check if ref looks like a release tag
    - if: $CI_COMMIT_REF_NAME =~ /^[v01].*/ && $CI_COMMIT_REF_PROTECTED == "true"
      when: always

# Tag images as 'develop' when on develop branch
publish-images-develop:
  stage: publish
  extends: 
    - .docker_image_builder_job_template
  variables:
    TAG: "develop"
  before_script:
    - !reference [.docker_image_builder_job_template, before_script]
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - |
      # Export build arguments for images that need them
      export BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      export GIT_COMMIT_SHA="${CI_COMMIT_SHA}"
      export GIT_CURRENT_BRANCH="${CI_COMMIT_BRANCH}"
      export GIT_LAST_LOG_MESSAGE="${CI_COMMIT_MESSAGE}"
      export GIT_LAST_COMMITTER="${CI_COMMIT_AUTHOR}"
      export GIT_LAST_COMMIT_DATE="${CI_COMMIT_TIMESTAMP}"
      export TAG="${TAG:-develop}"
      docker buildx bake --file=docker-bake.hcl --provenance=false --progress="plain" "develop-images"
  tags:
    - public-runner-docker
  rules:
    - if: $CI_PIPELINE_TRIGGERED
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline"
      when: never
    - if: $CI_COMMIT_BRANCH == "develop"
      when: always

######## End publish ########

######## Cleanup ########

# Deletes replay data used by the tests and created by haf_api_node_replay_data_copy
cleanup_haf_api_node_pipeline_cache:
  needs:
    - job: haf_api_node_replay_data_copy
      optional: true
    - job: haf_api_node_test
      optional: true
  extends:
    - .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "${REPLAY_PIPELINE_DIRECTORY}*"
  rules:
    - if: $CI_PIPELINE_TRIGGERED
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline"
      when: never
    - when: always
  tags:
    - data-cache-storage
    - fast

# Deletes all HAF API node replay data
cleanup_haf_api_node_cache_manual:
  extends: 
    - .cleanup_cache_manual_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "${REPLAY_DIRECTORY_PREFIX}*"
  rules:
    - if: $CI_PIPELINE_TRIGGERED
      when: never
    - if: $CI_PIPELINE_SOURCE == "pipeline"
      when: never
    - when: manual
      allow_failure: true
  tags:
    - data-cache-storage
    - fast

# Deletes HAF API node replay data older than 7 days
cleanup_old_haf_api_node_cache:
  extends:
    - .cleanup_old_cache_template
  stage: cleanup
  variables:
    CLEANUP_PATH_PATTERN: "${REPLAY_DIRECTORY_PREFIX}*"
  tags:
    - data-cache-storage
    - fast

######## End cleanup ########
