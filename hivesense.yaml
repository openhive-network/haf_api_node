services:
  # use this ollama instance for testing
  # for production it is better to use remote server with CUDA GPU cards
  hivesense-ollama:
    image: ollama/ollama:0.6.5
    profiles:
      - ollama
    environment:
      - TZ=America/New_York
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=16
      - OLLAMA_NUM_THREADS=16
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MODELS=/tmp/ollama
    tty: true
    networks:
      haf-network:
    volumes:
      - type: bind
        source: ${HAF_DATA_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}}/ollama
        target: /tmp/ollama
    entrypoint: /bin/sh
    command: >
      -c "
        ollama serve &

        until ollama list > /dev/null 2>&1; do
          echo 'Waiting for ollama to start...'
          sleep 1
        done

        echo 'Pulling model...'
        ollama pull \${HIVESENSE_MODEL:-yxchia/multilingual-e5-base:F16}
        echo 'Ready.'

        wait
      "
    # uncomment for nvidia:
    ### runtime: nvidia
    # or uncomment for amd:
    ### image: ollama/ollama:0.7.0-rc1-rocm
    ### environment:
    ###  - HIP_VISIBLE_DEVICES=0
    ### devices:
    ###  - /dev/kfd
    ###  - /dev/dri
    ### group_add:
    ###  - video
  hivesense-install-schema:
    image: ${HIVESENSE_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hivesense}:${HIVESENSE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - hivesense
      - hivesense-install
      - hivesense-local
      - hivesense-sync
    environment:
      POSTGRES_HOST: haf
    command:
      - install_app
      - "--llm=${HIVESENSE_MODEL:-yxchia/multilingual-e5-base:F16}"
      - "--vector_size=${HIVESENSE_VECTOR_SIZE:-768}"
      - "--ollama=${HIVESENSE_OLLAMA:-http://hivesense-ollama:11434}"
      - "--start_block=${HIVESENSE_START_BLOCK:-1}"
      - "--parallel_workers=${HIVESENSE_WORKERS:-16}"
      - "--embedding_batch_size=${HIVESENSE_EMBEDDING_BATCH_SIZE:-100}"
      - "--tokenizer-model=${HIVESENSE_TOKENIZER_MODEL_NAME:-e5-base}"
      - "--tokens_per_chunk=${HIVESENSE_TOKENS_PER_CHUNK:-512}"
      - "--overlap_amount=${HIVESENSE_OVERLAP_AMOUNT:-0.15}"
      - "--sentence_language_model=${HIVESENSE_SENTENCE_LANGUAGE_MODEL:-xx_sent_ud_sm}"
      - "--use-halfvec-index=${HIVESENSE_USE_HALFVEC_INDEX:-FALSE}"
      - "--store-halfvec-embeddings=${HIVESENSE_STORE_HALFVEC_EMBEDDINGS:-FALSE}"
      - "--document-prefix=${HIVESENSE_DOCUMENT_PREFIX-passage: }"
      - "--query-prefix=${HIVESENSE_QUERY_PREFIX-query: }"
      - "--min-token-threshold=${HIVESENSE_MIN_TOKEN_THRESHOLD:-75}"
      - "--min-token-search-threshold=${HIVESENSE_MIN_TOKEN_SEARCH_THRESHOLD:-0}"
      - "--swagger-url=${PUBLIC_HOSTNAME}/"
    networks:
      haf-network:
    depends_on:
      haf:
        condition: service_healthy
      hivemind-install:
        condition: service_completed_successfully
  # to uninstall Hivesense, shut down the stack and run a command like:
  #   docker compose --profile core --profile block-explorer-uninstall up -d
  hivesense-uninstall:
    image: ${HIVESENSE_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hivesense}:${HIVESENSE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - hivesense-uninstall
    environment:
      POSTGRES_HOST: haf
    command:
      - uninstall_app
    networks:
      haf-network:
    depends_on:
      haf:
        condition: service_healthy
  hivesense-block-processing:
    image: ${HIVESENSE_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hivesense}:${HIVESENSE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - hivesense-local
    environment:
      POSTGRES_HOST: haf
      POSTGRES_USER: hivesense_owner
    command: >
      process_blocks ${HIVESENSE_SYNC_ARGS:-}
    networks:
      haf-network:
    healthcheck:
      test: ["CMD-SHELL","/app/block-processing-healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 48h
    depends_on:
      hivesense-install-schema:
        condition: service_completed_successfully
      haf:
        condition: service_healthy
  hivesense-sync:
    image: ${HIVESENSE_SYNCER_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hivesense/syncer}:${HIVESENSE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - hivesense-sync
    environment:
      POSTGRES_URI: postgresql://hivesense_owner@haf/haf_block_log?application_name=hivesense_sync
      HIVESENSE_API: ${HIVESENSE_SYNC_API:-https://api.hive.blog/hivesense-api}
    init: true
    networks:
      haf-network:
    depends_on:
      hivesense-install-schema:
        condition: service_completed_successfully
      haf:
        condition: service_healthy
  hivesense-postgrest-rewriter:
    image: ${HIVESENSE_REWRITER_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hivesense/postgrest-rewriter}:${HIVESENSE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - hivesense
      - hivesense-local
      - hivesense-sync
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=2 -nv -t1 --spider 127.0.0.1:81/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    init: true
    depends_on:
      hivesense-postgrest:
        condition: service_healthy
    networks:
      - haf-network
  hivesense-postgrest:
    image: ${POSTGREST_IMAGE:-registry.gitlab.syncad.com/hive/haf_api_node/postgrest}:${POSTGREST_VERSION:-latest}
    profiles:
      - hivesense
      - hivesense-local
      - hivesense-sync
    environment:
      PGRST_ADMIN_SERVER_PORT: 3001
      PGRST_DB_URI: postgresql://hivesense_user@haf/haf_block_log?application_name=hivesense_postgrest
      PGRST_DB_SCHEMA: hivesense_endpoints
      PGRST_DB_ANON_ROLE: hivesense_user
      PGRST_DB_POOL: 20
      PGRST_DB_POOL_ACQUISITION_TIMEOUT: 10
      PGRST_DB_ROOT_SPEC: root
      PGRST_DB_EXTRA_SEARCH_PATH: hivesense_app
    networks:
      haf-network:
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=2 -nv -t1 --spider 127.0.0.1:3001/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    depends_on:
      hivesense-install-schema:
        condition: service_completed_successfully
      haf:
        condition: service_healthy
