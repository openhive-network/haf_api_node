services:
  haf:
    profiles:
      - core
      - block-explorer-uninstall
    image: ${HAF_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf}:${HAF_VERSION:-${HIVE_API_NODE_VERSION}}
    networks:
      - haf-network
    tty: true
    stdin_open: true
    init: true
    command: "${ARGUMENTS:-}"

    # after requesting a shutdown with SIGTERM, allow the container two minutes to exit
    # before killing it.  The default of ten seconds isn't enough for postgresql to
    # cleanly shut down, and would often make PostgreSQL perform crash recovery at the
    # next startup
    stop_grace_period: 2m
    # grant passwordless access to the other haf apps.  if you add apps later, you'll
    # need to add access rules for them here
    # TODO: needs work:
    environment:
      PG_ACCESS: "
        # haf_maintainer for background vacuum/index operations (hived connects via Unix socket)\n
        local   haf_block_log    haf_maintainer                                                                trust\n
        \n
        # PgBouncer connection pooler - connects as various users for PostgREST and healthchecks\n
        host    haf_block_log    hafah_user       ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    haf_block_log    hivemind_user    ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    haf_block_log    hafbe_user       ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    haf_block_log    btracker_user    ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    haf_block_log    reptracker_user  ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    haf_block_log    nfttracker_user  ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    haf_block_log    hivesense_user           ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    haf_block_log    proxy_whitelist_user     ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n
        host    postgres         haf_admin        ${COMPOSE_PROJECT_NAME}-pgbouncer-1.${NETWORK_NAME}                           trust\n

        # Direct connections for install/uninstall/processing (not pooled)\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-balance-tracker-install-1.${NETWORK_NAME}             trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-balance-tracker-uninstall-1.${NETWORK_NAME}           trust\n
        host    haf_block_log    btracker_owner   ${COMPOSE_PROJECT_NAME}-balance-tracker-block-processing-1.${NETWORK_NAME}    trust\n

        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-reputation-tracker-install-1.${NETWORK_NAME}          trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-reputation-tracker-uninstall-1.${NETWORK_NAME}        trust\n
        host    haf_block_log    reptracker_owner ${COMPOSE_PROJECT_NAME}-reputation-tracker-block-processing-1.${NETWORK_NAME} trust\n

        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-nft-tracker-install-1.${NETWORK_NAME}                 trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-nft-tracker-uninstall-1.${NETWORK_NAME}               trust\n
        host    haf_block_log    nfttracker_owner ${COMPOSE_PROJECT_NAME}-nft-tracker-block-processing-1.${NETWORK_NAME}        trust\n

        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hafah-uninstall-1.${NETWORK_NAME}                     trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hafah-install-1.${NETWORK_NAME}                       trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hafah-benchmarks-1.${NETWORK_NAME}                    trust\n

        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-block-explorer-install-schema-1.${NETWORK_NAME}       trust\n
        host    haf_block_log    hafbe_owner      ${COMPOSE_PROJECT_NAME}-block-explorer-install-schema-1.${NETWORK_NAME}       trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-block-explorer-uninstall-1.${NETWORK_NAME}            trust\n
        host    haf_block_log    hafbe_owner      ${COMPOSE_PROJECT_NAME}-block-explorer-uninstall-1.${NETWORK_NAME}            trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-block-explorer-uninstall-balance-tracker-1.${NETWORK_NAME}           trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-block-explorer-install-balance-tracker-1.${NETWORK_NAME}             trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-block-explorer-uninstall-reputation-tracker-1.${NETWORK_NAME}        trust\n

        host    haf_block_log    hafbe_owner      ${COMPOSE_PROJECT_NAME}-block-explorer-block-processing-1.${NETWORK_NAME}     trust\n

        # hivemind install needs to change the join_collapse_limit setting on the whole database, which\n
        # requires superuser privileges\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hivemind-install-1.${NETWORK_NAME}                    trust\n
        host    haf_block_log    hivemind         ${COMPOSE_PROJECT_NAME}-hivemind-install-1.${NETWORK_NAME}                    trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hivemind-block-processing-1.${NETWORK_NAME}           trust\n
        host    haf_block_log    hivemind         ${COMPOSE_PROJECT_NAME}-hivemind-block-processing-1.${NETWORK_NAME}           trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hivemind-server-1.${NETWORK_NAME}                     trust\n
        host    haf_block_log    hivemind         ${COMPOSE_PROJECT_NAME}-hivemind-server-1.${NETWORK_NAME}                     trust\n
        host    haf_block_log    hivemind         ${COMPOSE_PROJECT_NAME}-hivemind-postgrest-server-1.${NETWORK_NAME}           trust\n

        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hivemind-uninstall-1.${NETWORK_NAME}                  trust\n

        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-pgadmin-1.${NETWORK_NAME}                             trust\n
        host    postgres         haf_admin        ${COMPOSE_PROJECT_NAME}-pgadmin-1.${NETWORK_NAME}                             trust\n

        host    haf_block_log    pghero           ${COMPOSE_PROJECT_NAME}-pghero-1.${NETWORK_NAME}                              trust\n
        host    postgres         pghero           ${COMPOSE_PROJECT_NAME}-pghero-1.${NETWORK_NAME}                              trust\n

        host    postgres         postgres         ${COMPOSE_PROJECT_NAME}-postgresexporter-1.${NETWORK_NAME}                    trust\n

        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hivesense-install-schema-1.${NETWORK_NAME}            trust\n
        host    haf_block_log    hivesense_owner  ${COMPOSE_PROJECT_NAME}-hivesense-install-schema-1.${NETWORK_NAME}            trust\n
        host    haf_block_log    hivesense_owner  ${COMPOSE_PROJECT_NAME}-hivesense-block-processing-1.${NETWORK_NAME}          trust\n
        host    haf_block_log    hivesense_owner  ${COMPOSE_PROJECT_NAME}-hivesense-sync-1.${NETWORK_NAME}                      trust\n
        host    haf_block_log    hivesense_user   ${COMPOSE_PROJECT_NAME}-hivesense-pca-1.${NETWORK_NAME}                       trust\n
        host    haf_block_log    hivesense_owner  ${COMPOSE_PROJECT_NAME}-hivesense-pca-1.${NETWORK_NAME}                       trust\n

        host    haf_block_log    haf_admin                 ${COMPOSE_PROJECT_NAME}-proxy-whitelist-install-1.${NETWORK_NAME}            trust\n
        host    haf_block_log    proxy_whitelist_owner     ${COMPOSE_PROJECT_NAME}-proxy-whitelist-install-1.${NETWORK_NAME}            trust\n
        host    haf_block_log    proxy_whitelist_owner     ${COMPOSE_PROJECT_NAME}-proxy-whitelist-block-processing-1.${NETWORK_NAME}   trust\n

        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hafsql-1.${NETWORK_NAME}                              trust\n
        host    haf_block_log    hafsql_owner     ${COMPOSE_PROJECT_NAME}-hafsql-1.${NETWORK_NAME}                              trust\n
        host    haf_block_log    hafsql_user      ${COMPOSE_PROJECT_NAME}-hafsql-1.${NETWORK_NAME}                              trust\n
        host    haf_block_log    haf_admin        ${COMPOSE_PROJECT_NAME}-hafsql-uninstall-1.${NETWORK_NAME}                    trust\n
        "
      SHM_DIR: /home/hived/shm_dir
      ROCKSDB_DIR: /home/hived/rocksdb_dir
      WAL_DIR: /home/hived/wal_dir
      # PGCTLTIMEOUT sets how long we allow PostgreSQL to startup before giving up and shutting down the container.
      # If you have an unclean shutdown, and postgres needs to do startup recovery, working through all of the old
      # write-ahead logs, this can take longer than the default timeout, which is something like 60 seconds.
      # 10 minutes is probably long enough that anyone using NVMes will be able to recover their database at
      # startup.  If you're on slower drives or older hardware, you may need to increase this.
      PGCTLTIMEOUT: 600
      # HACK, do not commit
      OVERRIDE_LD_PRELOAD: ""
    # when mounting volumes, declare the directories you want to bind-mount here,
    # using either the short or long syntax.  Don't declare them as top-level named
    # volumes and mount them by name.  Declaring them inline here always results
    # in a recursive bind.  The behavior when declaring the volumes at the top-level
    # seems to vary from system to system (even when `o: rbind` is specified).
    volumes:
      - type: bind
        source: ${HAF_DATA_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}}/
        target: /home/hived/datadir
      - type: bind
        source: ${HAF_LOG_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs}/postgresql
        target: /home/hived/postgresql_logs/
      - type: bind
        source: ${HAF_SHM_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/shared_memory}/
        target: /home/hived/shm_dir
      - type: bind
        source: ${HAF_ROCKSDB_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/shared_memory}/
        target: /home/hived/rocksdb_dir
      - type: bind
        source: ${HAF_WAL_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/shared_memory/haf_wal}
        target: /home/hived/wal_dir
    shm_size: ${HAF_SHM_SIZE:-8gb}
    depends_on:
      hived-pme:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -T2 -nv -t1 --spider http://127.0.0.1:8091/ || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 10
      start_period: 72h
  hive-openapi-spec:
    image: ${HIVE_OPENAPI_SPEC_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/hive/openapi-spec}:${HIVE_VERSION:-${HIVE_API_NODE_VERSION}}
    profiles:
      - servers
    networks:
      - haf-network
    healthcheck:
      test: ["CMD-SHELL", "wget --timeout=2 -nv -t1 --spider 127.0.0.1:80/openapi.json || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 1m
    labels:
      - "io.hive.swagger.url=/hived-api/,/wallet-api/"
      - "io.hive.swagger.name=Legacy Hive JSON-RPC API,Wallet API"
      - "io.hive.swagger.interceptor=jsonrpc,jsonrpc"
      - "io.hive.swagger.order=98,99"
      - "io.hive.healthcheck.port=7003,7003"
  logrotate:
    image: ${LOGROTATE_IMAGE:-${HIVE_API_NODE_REGISTRY:-registry.hive.blog}/haf_api_node/logrotate}:${LOGROTATE_VERSION:-latest}
    profiles:
      - logrotate
    init: true
    networks:
      - haf-network
    healthcheck:
      test: ["CMD-SHELL", "pidof crond || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - type: bind
        source: ${HAF_LOG_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs}/postgresql
        target: /var/log/postgresql
      - type: bind
        source: ${HAF_DATA_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}}/logs/caddy
        target: /var/log/caddy
      - type: bind
        source: ${HAF_DATA_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}}/logs/haproxy
        target: /var/log/haproxy
      - type: bind
        source: ${HAF_LOG_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs}/drone
        target: /var/log/drone
      - type: bind
        source: ./logrotate/logrotate.d
        target: /etc/logrotate.d.sources
        read_only: true
  pgbadger:
    image: matsuu/pgbadger
    profiles:
      - pgbadger
    entrypoint: /bin/sleep
    command: infinity
    volumes:
      - type: bind
        source: ${HAF_DATA_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}}/logs/pgbadger
        target: /pgbadger_output
      - type: bind
        source: ${HAF_LOG_DIRECTORY:-${TOP_LEVEL_DATASET_MOUNTPOINT}/logs}/postgresql
        target: /postgresql_logs
        read_only: true
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.datecron.schedule: "@daily"
      ofelia.job-exec.datecron.command: "/bin/sh -c '/usr/local/bin/pgbadger -I -O /pgbadger_output /postgresql_logs/*'"
  ofelia:
    image: mcuadros/ofelia:latest
    profiles:
      - pgbadger
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
