# Container metrics from cAdvisor (monitoring-system profile).
# Override with monitoring/prometheus-disabled/empty-scrape.yml on stacks
# that don't run cadvisor to suppress the up==0 noise.

scrape_configs:
  - job_name: "cadvisor"
    scrape_interval: 5s
    static_configs:
      - targets: ["cadvisor:8080"]
