# Drone JSON-RPC caching proxy (servers profile).
# Override with monitoring/prometheus-disabled/empty-scrape.yml on stacks
# that don't run drone (e.g. backend-only stacks).

scrape_configs:
  - job_name: "drone"
    scrape_interval: 5s
    static_configs:
      - targets: ["drone:9000"]
    metrics_path: /metrics
