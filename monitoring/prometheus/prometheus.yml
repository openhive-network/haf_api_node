global:
  scrape_interval: 15s
  evaluation_interval: 15s

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  # ${VAR} substitution requires --enable-feature=expand-external-labels (set in
  # monitoring.yaml). PROMETHEUS_ROLE/PROMETHEUS_INSTANCE default to "default"
  # and the compose project name; override per-stack via .env for multi-host
  # federation setups.
  external_labels:
    monitor: "docker-host"
    role: "${PROMETHEUS_ROLE}"
    instance: "${PROMETHEUS_INSTANCE}"

# Load and evaluate rules in this file every 'evaluation_interval' seconds.
rule_files:
  - "drone.rules"

# Scrape jobs are loaded from per-target files matching scrape-*.yml.
# extra/ is a deployment-local extension dir (see monitoring/prometheus-extra/);
# put per-host additions like federation jobs there.
scrape_config_files:
  - "scrape-*.yml"
  - "extra/*.yml"
