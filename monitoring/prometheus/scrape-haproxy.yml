# HAProxy (servers profile, built-in Prometheus exporter).
# Override with monitoring/prometheus-disabled/empty-scrape.yml on stacks
# that don't run haproxy (e.g. backend-only stacks).

scrape_configs:
  - job_name: "haproxy"
    scrape_interval: 5s
    static_configs:
      - targets: ["haproxy:8000"]
    metrics_path: /metrics
